networks:
  mqtt-network:
    driver: bridge
services:
  smart-mqtt:
    container_name: smart-mqtt
    hostname: smart-mqtt
    image: smartboot/smart-mqtt:latest
    networks:
      mqtt-network: null
    environment:
      ENTERPRISE_ENABLE: true
#      BROKER_LOWMEMORY: true
      BROKER_MAXINFLIGHT: 256
    restart: always
    privileged: true
    security_opt:
      - no-new-privileges:true
    user: root:root
    ports:
      - 18083:18083
      - 1883:1883
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "1"

  mqtt-broker:
    container_name: mqtt-broker
    hostname: mqtt-broker
    image: smartboot/smart-mqtt:latest
    networks:
      mqtt-network: null
    environment:
      ENTERPRISE_ENABLE: false
      BROKER_MAXINFLIGHT: 256
    restart: always
    privileged: true
    security_opt:
      - no-new-privileges:true
    user: root:root
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "1"


