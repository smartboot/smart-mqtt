# MQTT压测插件配置
# 支持配置多个压测场景，通过 activeScenario 选择激活的场景

# ==================== 公共参数 ====================
# MQTT服务器地址
host: 127.0.0.1
# MQTT服务器端口
port: 1883
# 消息负载大小（字节）
payloadSize: 128
# 主题数量
topicCount: 128
# ==================================================

# 激活的场景名称
active: "mixed"

# 场景配置列表
scenarios:
  # ==================== 基础场景 ====================
  
  # 场景1: 纯发布压测
  # 适用场景: 测试Broker的消息接收能力
  - name: "publish-only"
    subscribers: 0           # 订阅者数量为0，不启动订阅者
    publishers: 2000         # 发布者数量
    rate: 1000               # 每个连接每秒推送1000条消息
    publishQos: 0            # 发布QoS等级
    subscribeQos: 0          # 订阅QoS等级

  - name: "publish-only-2"
    subscribers: 0           # 订阅者数量为0，不启动订阅者
    publishers: 2000         # 发布者数量
    rate: 1000               # 每个连接每秒推送1000条消息
    publishQos: 1            # 发布QoS等级
    subscribeQos: 0          # 订阅QoS等级

  - name: "publish-only-3"
    subscribers: 0           # 订阅者数量为0，不启动订阅者
    publishers: 2000         # 发布者数量
    rate: 1000               # 每个连接每秒推送1000条消息
    publishQos: 2            # 发布QoS等级
    subscribeQos: 0          # 订阅QoS等级

  - name: "publish-only-4"
    subscribers: 0           # 订阅者数量为0，不启动订阅者
    publishers: 5000         # 发布者数量
    rate: 1000               # 每个连接每秒推送1000条消息
    publishQos: 0            # 发布QoS等级
    subscribeQos: 0          # 订阅QoS等级

  - name: "publish-only-5"
    subscribers: 0           # 订阅者数量为0，不启动订阅者
    publishers: 5000         # 发布者数量
    rate: 1000               # 每个连接每秒推送1000条消息
    publishQos: 1            # 发布QoS等级
    subscribeQos: 0          # 订阅QoS等级

  - name: "publish-only-6"
    subscribers: 0           # 订阅者数量为0，不启动订阅者
    publishers: 5000         # 发布者数量
    rate: 1000               # 每个连接每秒推送1000条消息
    publishQos: 2            # 发布QoS等级
    subscribeQos: 0          # 订阅QoS等级

  - name: "publish-only-7"
    subscribers: 2000           # 订阅者数量为0，不启动订阅者
    publishers: 10         # 发布者数量
    rate: 100               # 每个连接每秒推送1000条消息
    publishQos: 0            # 发布QoS等级
    subscribeQos: 0          # 订阅QoS等级

  - name: "publish-only-8"
    subscribers: 2000           # 订阅者数量为0，不启动订阅者
    publishers: 10         # 发布者数量
    rate: 100               # 每个连接每秒推送1000条消息
    publishQos: 0            # 发布QoS等级
    subscribeQos: 1          # 订阅QoS等级

  - name: "publish-only-9"
    subscribers: 2000           # 订阅者数量为0，不启动订阅者
    publishers: 10         # 发布者数量
    rate: 100               # 每个连接每秒推送1000条消息
    publishQos: 0            # 发布QoS等级
    subscribeQos: 2          # 订阅QoS等级
