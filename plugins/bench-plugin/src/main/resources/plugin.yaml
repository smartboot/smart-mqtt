# MQTT压测插件配置
# 支持配置多个压测场景，通过 activeScenario 选择激活的场景

# ==================== 公共参数 ====================
# MQTT服务器地址
host: 127.0.0.1
# MQTT服务器端口
port: 1883
# 消息负载大小（字节）
payloadSize: 128
# 主题数量
topicCount: 128
# QoS等级: 0-AtMostOnce, 1-AtLeastOnce, 2-ExactlyOnce
qos: 0
# ==================================================

# 激活的场景名称
active: "mixed"

# 场景配置列表
scenarios:
  # 场景1: 纯发布压测
  - name: "publish-only"
    subscribers: 0       # 订阅者数量为0，不启动订阅者
    publishers: 10       # 发布者数量
    rate: 1000           # 每个连接每秒推送1000条消息

  # 场景2: 纯订阅压测（需要外部发布者）
  - name: "subscribe-only"
    subscribers: 2000    # 订阅者数量
    publishers: 0        # 发布者数量为0，不启动内部发布者

  # 场景3: 混合压测（订阅者+内部发布者）
  - name: "mixed"
    subscribers: 1000    # 订阅者数量
    publishers: 10       # 发布者数量
    rate: 1000           # 每个连接每秒推送1000条消息